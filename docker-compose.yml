services:
  postgres:
    image: postgres:16-alpine
    ports:
      - 30041:5432
    environment:
      POSTGRES_USER: plaledger
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: plaledger
    volumes:
      - /opt/plaledger/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plaledger"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pla-ledger-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "30040:80"
    environment:
      NODE_ENV: production
      PORT: 80
      DATABASE_URL: postgres://plaledger:${DB_PASSWORD}@postgres:5432/plaledger
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - ./frontend/dist:/var/www/frontend/dist:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - pla-ledger-network

networks:
  pla-ledger-network:
    driver: bridge
