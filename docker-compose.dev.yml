services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: plaledger
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: plaledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_dev_data:
